<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Device Approvals - OpenClaw Manager</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7f9; color: #1f2933; }
      main { max-width: 920px; margin: 32px auto; padding: 0 20px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
      h1 { font-size: 24px; margin: 0; }
      section { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
      label { display: block; font-weight: 600; margin: 12px 0 6px; }
      input { box-sizing: border-box; width: 100%; height: 38px; border: 1px solid #b8c0cc; border-radius: 6px; padding: 0 10px; font-size: 14px; }
      button, .link-button { display: inline-flex; align-items: center; height: 38px; border-radius: 6px; padding: 0 14px; font-weight: 600; text-decoration: none; }
      button { margin-top: 14px; border: 0; background: #2563eb; color: #fff; cursor: pointer; }
      .link-button { background: #eef2ff; color: #1d4ed8; }
      pre { white-space: pre-wrap; word-break: break-word; background: #101828; color: #e4e7ec; border-radius: 8px; padding: 14px; overflow: auto; max-height: 520px; }
      .error { background: #fef3f2; border-color: #fecdca; color: #b42318; }
      .muted { color: #526070; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Device Approvals</h1>
        <a class="link-button" href="/admin/users">All Users</a>
      </header>

      {% if error %}
        <section class="error">{{ error }}</section>
      {% endif %}

      <section>
        <form method="post" action="/admin/device-approvals">
          <label for="input_csv">Input CSV</label>
          <input id="input_csv" name="input_csv" value="/data/docker/openclaw-public/batches/test_batch/approve_input.csv" required>

          <label for="output_csv">Output CSV</label>
          <input id="output_csv" name="output_csv" value="/data/docker/openclaw-public/batches/test_batch/approve_results.csv" required>

          <button type="submit" name="action" value="preview">Preview Pending Requests</button>
          <button type="submit" name="action" value="approve">Run Batch Approval</button>
        </form>
        <p class="muted">Paths must be under /data/docker/openclaw-public/batches.</p>
      </section>

      {% if result %}
        <section>
          <pre>{{ result }}</pre>
        </section>
      {% endif %}
    </main>
  </body>
</html>
