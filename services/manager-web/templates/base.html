<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenClaw Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --oc-ink: #17202a;
        --oc-muted: #6c7786;
        --oc-line: #dfe5ec;
        --oc-panel: #ffffff;
        --oc-panel-soft: #f7f4ee;
        --oc-page: #f3f5f3;
        --oc-red: #b51f2b;
        --oc-red-dark: #8f1822;
        --oc-red-soft: #f8e6e8;
        --oc-green: #16735f;
        --oc-green-soft: #e3f2ed;
        --oc-amber: #9d6a13;
        --oc-amber-soft: #fff2d2;
        --oc-blue: #225e8c;
        --oc-blue-soft: #e3eff8;
        --oc-shadow: 0 18px 45px rgba(23, 32, 42, 0.08);
      }
      * {
        letter-spacing: 0;
      }
      body {
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82) 0%, rgba(243, 245, 243, 0.92) 42%, #eef2f1 100%),
          radial-gradient(circle at top left, rgba(181, 31, 43, 0.12), transparent 34%),
          linear-gradient(135deg, rgba(34, 94, 140, 0.10) 0 25%, transparent 25% 100%);
        color: var(--oc-ink);
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
      }
      a {
        color: var(--oc-blue);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }
      a:hover {
        color: var(--oc-red-dark);
      }
      .navbar-oc {
        background: rgba(23, 32, 42, 0.96);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px rgba(23, 32, 42, 0.14);
      }
      .navbar-brand {
        font-weight: 760;
      }
      .nav-admin {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
      }
      .nav-admin a {
        display: inline-flex;
        align-items: center;
        min-height: 2rem;
        padding: 0.28rem 0.62rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 0.42rem;
        color: rgba(255, 255, 255, 0.82);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 720;
      }
      .nav-admin a:hover {
        border-color: rgba(255, 255, 255, 0.38);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .brand-mark {
        display: inline-grid;
        width: 1.8rem;
        height: 1.8rem;
        margin-right: 0.55rem;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 0.35rem;
        background: var(--oc-red);
        color: #fff;
        font-size: 0.82rem;
        font-weight: 800;
      }
      .page-shell {
        max-width: 1240px;
      }
      .page-kicker {
        color: var(--oc-muted);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .page-title {
        margin: 0;
        color: var(--oc-ink);
        font-weight: 780;
      }
      .page-subtitle {
        color: var(--oc-muted);
      }
      .btn-oc {
        background: var(--oc-red);
        border-color: var(--oc-red);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 10px 22px rgba(181, 31, 43, 0.18);
      }
      .btn-oc:hover {
        background: var(--oc-red-dark);
        border-color: var(--oc-red-dark);
        color: #fff;
      }
      .btn-oc-outline {
        border-color: #c8d0d9;
        color: var(--oc-ink);
        background: rgba(255, 255, 255, 0.78);
        font-weight: 700;
      }
      .btn-oc-outline:hover {
        border-color: var(--oc-red);
        background: var(--oc-red);
        color: #fff;
      }
      .btn {
        border-radius: 0.48rem;
      }
      .text-oc {
        color: var(--oc-red) !important;
      }
      .card {
        border: 1px solid rgba(223, 229, 236, 0.96);
        border-radius: 0.55rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--oc-shadow);
      }
      .card-header {
        background: rgba(255, 255, 255, 0.88);
        border-bottom-color: var(--oc-line);
      }
      .surface {
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--oc-shadow);
      }
      .metric {
        min-height: 6.5rem;
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: linear-gradient(180deg, #fff 0%, #f9faf8 100%);
        padding: 1rem;
      }
      .metric-label {
        color: var(--oc-muted);
        font-size: 0.78rem;
        font-weight: 760;
        text-transform: uppercase;
      }
      .metric-value {
        margin-top: 0.35rem;
        font-size: 1.08rem;
        font-weight: 780;
        word-break: break-word;
      }
      .badge-status {
        display: inline-flex;
        align-items: center;
        min-height: 1.75rem;
        padding: 0.28rem 0.62rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 780;
      }
      .badge-running {
        background: var(--oc-green-soft);
        color: var(--oc-green);
      }
      .badge-stopped {
        background: var(--oc-amber-soft);
        color: var(--oc-amber);
      }
      .badge-neutral {
        background: #edf0f4;
        color: #52606d;
      }
      .table thead th {
        background: #f6f8fa;
        color: #5d6977;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .table > :not(caption) > * > * {
        padding: 0.92rem 1rem;
        border-bottom-color: #edf0f3;
      }
      .table-hover tbody tr:hover {
        background-color: rgba(34, 94, 140, 0.045);
      }
      .form-control {
        border-color: #cfd7df;
        border-radius: 0.48rem;
      }
      .form-control:focus {
        border-color: var(--oc-blue);
        box-shadow: 0 0 0 0.22rem rgba(34, 94, 140, 0.12);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .codebox {
        max-height: 30rem;
        overflow: auto;
        background: #15202b;
        color: #dfe9ef;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.5rem;
        padding: 1rem;
        font-size: 0.82rem;
        line-height: 1.55;
      }
      .soft-danger {
        background: var(--oc-red-soft);
        color: var(--oc-red-dark);
        border: 1px solid #efc0c0;
      }
      .soft-success {
        background: var(--oc-green-soft);
        color: var(--oc-green);
        border: 1px solid #b8dccc;
      }
      .action-panel {
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: var(--oc-panel-soft);
        padding: 1rem;
      }
      .section-title {
        color: var(--oc-ink);
        font-size: 0.95rem;
        font-weight: 820;
      }
      .muted-small {
        color: var(--oc-muted);
        font-size: 0.88rem;
      }
      @media (max-width: 575.98px) {
        .page-title {
          font-size: 1.55rem;
        }
        .table > :not(caption) > * > * {
          padding: 0.72rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark navbar-oc">
      <div class="container-fluid px-3 px-lg-4">
        <span class="navbar-brand mb-0 h1"><span class="brand-mark">OC</span>OpenClaw Manager</span>
        <div class="nav-admin">
          <a href="/admin/users">Users</a>
          <a href="/admin/create-user">Create</a>
          <a href="/admin/device-approvals">Devices</a>
          <a href="/admin/metadata">Metadata</a>
          {% block nav_right %}{% endblock %}
        </div>
      </div>
    </nav>
    <main class="container page-shell py-4 py-lg-5">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
