<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenClaw Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --oc-red: #cc1a1a;
        --oc-red-dark: #9f1313;
        --oc-red-soft: #f8e8e8;
      }
      body {
        background: linear-gradient(180deg, #fff5f5 0%, #f6f7f9 18%, #f6f7f9 100%);
        color: #1f2933;
      }
      .navbar-oc {
        background: var(--oc-red);
      }
      .btn-oc {
        background: var(--oc-red);
        border-color: var(--oc-red);
        color: #fff;
      }
      .btn-oc:hover {
        background: var(--oc-red-dark);
        border-color: var(--oc-red-dark);
        color: #fff;
      }
      .btn-oc-outline {
        border-color: var(--oc-red);
        color: var(--oc-red);
      }
      .btn-oc-outline:hover {
        background: var(--oc-red);
        color: #fff;
      }
      .text-oc {
        color: var(--oc-red) !important;
      }
      .card {
        border-radius: 0.75rem;
        border-color: #e6e8ee;
      }
      .card-header {
        background: #fff;
        border-bottom-color: #eef1f5;
      }
      .table thead th {
        background: #fafbfd;
        color: #526070;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .codebox {
        background: #101828;
        color: #e4e7ec;
        border-radius: 0.75rem;
        padding: 1rem;
      }
      .soft-danger {
        background: var(--oc-red-soft);
        color: var(--oc-red-dark);
        border: 1px solid #efc0c0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark navbar-oc">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">OpenClaw Manager</span>
        <span class="navbar-text text-white-50">
          {% block nav_right %}{% endblock %}
        </span>
      </div>
    </nav>
    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
