<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenClaw Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --oc-ink: #17202a;
        --oc-muted: #6c7786;
        --oc-line: #dfe5ec;
        --oc-panel: #ffffff;
        --oc-panel-soft: #f7f4ee;
        --oc-page: #f3f5f3;
        --oc-red: #b51f2b;
        --oc-red-dark: #8f1822;
        --oc-red-soft: #f8e6e8;
        --oc-green: #16735f;
        --oc-green-soft: #e3f2ed;
        --oc-amber: #9d6a13;
        --oc-amber-soft: #fff2d2;
        --oc-blue: #225e8c;
        --oc-blue-soft: #e3eff8;
        --oc-shadow: 0 18px 45px rgba(23, 32, 42, 0.08);
      }
      * {
        letter-spacing: 0;
      }
      body {
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82) 0%, rgba(243, 245, 243, 0.92) 42%, #eef2f1 100%),
          radial-gradient(circle at top left, rgba(181, 31, 43, 0.12), transparent 34%),
          linear-gradient(135deg, rgba(34, 94, 140, 0.10) 0 25%, transparent 25% 100%);
        color: var(--oc-ink);
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
      }
      a {
        color: var(--oc-blue);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }
      a:hover {
        color: var(--oc-red-dark);
      }
      .brand-mark {
        display: inline-grid;
        width: 1.8rem;
        height: 1.8rem;
        margin-right: 0.55rem;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 0.35rem;
        background: var(--oc-red);
        color: #fff;
        font-size: 0.82rem;
        font-weight: 800;
      }
      .app-layout {
        display: grid;
        grid-template-columns: 15.5rem minmax(0, 1fr);
        min-height: 100vh;
      }
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 1rem;
        background: rgba(23, 32, 42, 0.98);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 10px 0 30px rgba(23, 32, 42, 0.10);
      }
      .sidebar-brand {
        display: flex;
        align-items: center;
        margin-bottom: 1.25rem;
        color: #fff;
        font-size: 1.02rem;
        font-weight: 780;
      }
      .sidebar-section {
        margin: 1rem 0 0.45rem;
        color: rgba(255, 255, 255, 0.44);
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
      }
      .sidebar-nav {
        display: grid;
        gap: 0.35rem;
      }
      .sidebar-nav a {
        display: flex;
        align-items: center;
        min-height: 2.35rem;
        padding: 0.45rem 0.65rem;
        border: 1px solid transparent;
        border-radius: 0.48rem;
        color: rgba(255, 255, 255, 0.78);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 720;
      }
      .sidebar-nav a:hover {
        border-color: rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .sidebar-footer {
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        left: 1rem;
        color: rgba(255, 255, 255, 0.48);
        font-size: 0.78rem;
      }
      .content-shell {
        min-width: 0;
      }
      .page-shell {
        max-width: 1240px;
      }
      .page-kicker {
        color: var(--oc-muted);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .page-title {
        margin: 0;
        color: var(--oc-ink);
        font-weight: 780;
      }
      .page-subtitle {
        color: var(--oc-muted);
      }
      .btn-oc {
        background: var(--oc-red);
        border-color: var(--oc-red);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 10px 22px rgba(181, 31, 43, 0.18);
      }
      .btn-oc:hover {
        background: var(--oc-red-dark);
        border-color: var(--oc-red-dark);
        color: #fff;
      }
      .btn-oc-outline {
        border-color: #c8d0d9;
        color: var(--oc-ink);
        background: rgba(255, 255, 255, 0.78);
        font-weight: 700;
      }
      .btn-oc-outline:hover {
        border-color: var(--oc-red);
        background: var(--oc-red);
        color: #fff;
      }
      .btn {
        border-radius: 0.48rem;
      }
      .text-oc {
        color: var(--oc-red) !important;
      }
      .card {
        border: 1px solid rgba(223, 229, 236, 0.96);
        border-radius: 0.55rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--oc-shadow);
      }
      .card-header {
        background: rgba(255, 255, 255, 0.88);
        border-bottom-color: var(--oc-line);
      }
      .surface {
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--oc-shadow);
      }
      .metric {
        min-height: 6.5rem;
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: linear-gradient(180deg, #fff 0%, #f9faf8 100%);
        padding: 1rem;
      }
      .metric-label {
        color: var(--oc-muted);
        font-size: 0.78rem;
        font-weight: 760;
        text-transform: uppercase;
      }
      .metric-value {
        margin-top: 0.35rem;
        font-size: 1.08rem;
        font-weight: 780;
        word-break: break-word;
      }
      .badge-status {
        display: inline-flex;
        align-items: center;
        min-height: 1.75rem;
        padding: 0.28rem 0.62rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 780;
      }
      .badge-running {
        background: var(--oc-green-soft);
        color: var(--oc-green);
      }
      .badge-stopped {
        background: var(--oc-amber-soft);
        color: var(--oc-amber);
      }
      .badge-neutral {
        background: #edf0f4;
        color: #52606d;
      }
      .table thead th {
        background: #f6f8fa;
        color: #5d6977;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .table > :not(caption) > * > * {
        padding: 0.92rem 1rem;
        border-bottom-color: #edf0f3;
      }
      .table-hover tbody tr:hover {
        background-color: rgba(34, 94, 140, 0.045);
      }
      .form-control {
        border-color: #cfd7df;
        border-radius: 0.48rem;
      }
      .form-control:focus {
        border-color: var(--oc-blue);
        box-shadow: 0 0 0 0.22rem rgba(34, 94, 140, 0.12);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .codebox {
        max-height: 30rem;
        overflow: auto;
        background: #15202b;
        color: #dfe9ef;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.5rem;
        padding: 1rem;
        font-size: 0.82rem;
        line-height: 1.55;
      }
      .soft-danger {
        background: var(--oc-red-soft);
        color: var(--oc-red-dark);
        border: 1px solid #efc0c0;
      }
      .soft-success {
        background: var(--oc-green-soft);
        color: var(--oc-green);
        border: 1px solid #b8dccc;
      }
      .soft-warning {
        background: var(--oc-amber-soft);
        color: var(--oc-amber);
        border: 1px solid #edd18d;
      }
      .action-panel {
        border: 1px solid var(--oc-line);
        border-radius: 0.55rem;
        background: var(--oc-panel-soft);
        padding: 1rem;
      }
      .section-title {
        color: var(--oc-ink);
        font-size: 0.95rem;
        font-weight: 820;
      }
      .muted-small {
        color: var(--oc-muted);
        font-size: 0.88rem;
      }
      @media (max-width: 860px) {
        .app-layout {
          display: block;
        }
        .sidebar {
          position: static;
          height: auto;
          padding: 0.85rem;
        }
        .sidebar-brand {
          margin-bottom: 0.75rem;
        }
        .sidebar-section,
        .sidebar-footer {
          display: none;
        }
        .sidebar-nav {
          display: flex;
          gap: 0.4rem;
          overflow-x: auto;
          padding-bottom: 0.1rem;
        }
        .sidebar-nav a {
          flex: 0 0 auto;
        }
      }
      @media (max-width: 575.98px) {
        .page-title {
          font-size: 1.55rem;
        }
        .table > :not(caption) > * > * {
          padding: 0.72rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-brand"><span class="brand-mark">OC</span>OpenClaw Manager</div>
        <div class="sidebar-section">Operations</div>
        <div class="sidebar-nav">
          <a href="/admin/users">Users</a>
          <a href="/admin/create-user">Create Instance</a>
          <a href="/admin/device-approvals">Device Approvals</a>
          <a href="/admin/metadata">Metadata</a>
          {% block nav_right %}{% endblock %}
        </div>
        <div class="sidebar-footer">Instance control plane</div>
      </aside>
      <div class="content-shell">
        <main class="container page-shell py-4 py-lg-5">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
