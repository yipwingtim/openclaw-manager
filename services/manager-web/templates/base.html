<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}容器实例管理与运维平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --oc-ink: #182331;
        --oc-muted: #718097;
        --oc-line: #d7e0e8;
        --oc-line-strong: #b9c8d6;
        --oc-panel: #ffffff;
        --oc-panel-soft: #f4f8fb;
        --oc-page: #eef4f7;
        --oc-red: #d7475d;
        --oc-red-dark: #a92b3f;
        --oc-red-soft: #fde8ed;
        --oc-green: #087a67;
        --oc-green-soft: #ddf6ef;
        --oc-amber: #a26105;
        --oc-amber-soft: #fff0cf;
        --oc-blue: #126a9c;
        --oc-blue-soft: #e2f3fb;
        --oc-cyan: #09a9c8;
        --oc-cyan-soft: #dff8fb;
        --oc-violet: #5f64d8;
        --oc-sidebar: #0d1721;
        --oc-sidebar-2: #122638;
        --oc-shadow: 0 20px 60px rgba(15, 31, 44, 0.12);
        --oc-glow: 0 0 0 1px rgba(9, 169, 200, 0.18), 0 16px 44px rgba(9, 169, 200, 0.10);
      }
      * {
        letter-spacing: 0;
      }
      *::selection {
        background: rgba(9, 169, 200, 0.22);
      }
      body {
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(18, 106, 156, 0.055) 1px, transparent 1px),
          linear-gradient(180deg, rgba(18, 106, 156, 0.04) 1px, transparent 1px),
          radial-gradient(circle at 18% 8%, rgba(9, 169, 200, 0.18), transparent 28rem),
          radial-gradient(circle at 92% 18%, rgba(8, 122, 103, 0.13), transparent 24rem),
          linear-gradient(180deg, #f7fbfd 0%, #eef4f7 48%, #e8f0f3 100%);
        background-size: 44px 44px, 44px 44px, auto, auto, auto;
        color: var(--oc-ink);
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(120deg, transparent 0 58%, rgba(9, 169, 200, 0.08) 58% 58.25%, transparent 58.25% 100%),
          linear-gradient(120deg, transparent 0 71%, rgba(18, 106, 156, 0.08) 71% 71.18%, transparent 71.18% 100%);
      }
      a {
        color: var(--oc-blue);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }
      a:hover {
        color: var(--oc-red-dark);
      }
      .brand-mark {
        display: inline-grid;
        width: 1.8rem;
        height: 1.8rem;
        margin-right: 0.55rem;
        place-items: center;
        border: 1px solid rgba(96, 219, 232, 0.44);
        border-radius: 0.42rem;
        background:
          linear-gradient(135deg, rgba(9, 169, 200, 0.95), rgba(8, 122, 103, 0.86));
        color: #f7feff;
        font-size: 0.82rem;
        font-weight: 800;
        box-shadow: 0 0 22px rgba(9, 169, 200, 0.26);
      }
      .app-layout {
        display: grid;
        grid-template-columns: 16.25rem minmax(0, 1fr);
        min-height: 100vh;
      }
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 1.1rem;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(18, 38, 56, 0.92), rgba(13, 23, 33, 0.98)),
          linear-gradient(135deg, rgba(9, 169, 200, 0.18), transparent 42%);
        border-right: 1px solid rgba(126, 194, 217, 0.18);
        box-shadow: 14px 0 42px rgba(13, 23, 33, 0.18);
      }
      .sidebar::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.032) 1px, transparent 1px);
        background-size: 26px 26px;
        mask-image: linear-gradient(180deg, black, transparent 82%);
      }
      .sidebar::after {
        content: "";
        position: absolute;
        right: -4rem;
        bottom: 7rem;
        width: 10rem;
        height: 10rem;
        border: 1px solid rgba(9, 169, 200, 0.18);
        transform: rotate(35deg);
      }
      .sidebar-brand {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        margin-bottom: 1.25rem;
        color: #fff;
        font-size: 1.02rem;
        font-weight: 780;
      }
      .sidebar-section {
        position: relative;
        z-index: 1;
        margin: 1rem 0 0.45rem;
        color: rgba(157, 220, 232, 0.62);
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
      }
      .sidebar-nav {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 0.35rem;
      }
      .sidebar-nav a {
        display: flex;
        align-items: center;
        min-height: 2.35rem;
        padding: 0.5rem 0.72rem;
        border: 1px solid rgba(126, 194, 217, 0.08);
        border-radius: 0.42rem;
        background: rgba(255, 255, 255, 0.035);
        color: rgba(234, 247, 250, 0.82);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 720;
        transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
      }
      .sidebar-nav a:hover {
        border-color: rgba(9, 169, 200, 0.36);
        background: linear-gradient(90deg, rgba(9, 169, 200, 0.16), rgba(255, 255, 255, 0.055));
        color: #fff;
        transform: translateX(2px);
      }
      .sidebar-footer {
        z-index: 1;
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        left: 1rem;
        border-top: 1px solid rgba(126, 194, 217, 0.18);
        padding-top: 0.85rem;
        color: rgba(197, 226, 233, 0.58);
        font-size: 0.78rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .oc-nav-icon {
        width: 1.1rem;
        height: 1.1rem;
        margin-right: 0.62rem;
        flex-shrink: 0;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .sidebar-nav-extra {
        color: rgba(234, 247, 250, 0.62);
        font-size: 0.82rem;
        padding: 0.3rem 0.72rem;
        word-break: break-word;
      }
      .sidebar-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.8rem;
        height: 1.8rem;
        border: 1px solid rgba(126, 194, 217, 0.24);
        border-radius: 0.38rem;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(234, 247, 250, 0.82);
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
      }
      .sidebar-toggle:hover {
        border-color: rgba(9, 169, 200, 0.5);
        background: rgba(9, 169, 200, 0.18);
        color: #fff;
      }
      .oc-toggle-icon {
        width: 1rem;
        height: 1rem;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .oc-toggle-expand { display: none; }
      .sidebar.collapsed .oc-toggle-collapse { display: none; }
      .sidebar.collapsed .oc-toggle-expand { display: inline-flex; }
      .app-layout.sidebar-collapsed {
        grid-template-columns: 4.5rem minmax(0, 1fr);
      }
      .sidebar.collapsed .sidebar-brand {
        justify-content: center;
      }
      .sidebar.collapsed .brand-mark {
        margin-right: 0;
      }
      .sidebar.collapsed .sidebar-brand-text,
      .sidebar.collapsed .sidebar-section,
      .sidebar.collapsed .sidebar-nav-extra,
      .sidebar.collapsed .sidebar-footer-text,
      .sidebar.collapsed .sidebar-nav a > span {
        display: none;
      }
      .sidebar.collapsed .sidebar-nav a {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      .sidebar.collapsed .oc-nav-icon {
        margin-right: 0;
      }
      .sidebar.collapsed .sidebar-footer {
        justify-content: center;
      }
      .sidebar.collapsed .sidebar-nav a:hover {
        transform: none;
      }
      .content-shell {
        min-width: 0;
      }
      .page-shell {
        max-width: 1240px;
      }
      .page-kicker {
        color: var(--oc-blue);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .page-title {
        margin: 0;
        color: var(--oc-ink);
        font-weight: 820;
      }
      .page-subtitle {
        color: var(--oc-muted);
      }
      .btn-oc {
        background: linear-gradient(135deg, var(--oc-blue), var(--oc-cyan));
        border-color: rgba(9, 169, 200, 0.74);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 12px 24px rgba(9, 169, 200, 0.22);
      }
      .btn-oc:hover {
        background: linear-gradient(135deg, #075982, #078fa9);
        border-color: #078fa9;
        color: #fff;
      }
      .btn-oc-outline {
        border-color: #b8cad8;
        color: var(--oc-ink);
        background: rgba(255, 255, 255, 0.76);
        font-weight: 700;
      }
      .btn-oc-outline:hover {
        border-color: var(--oc-blue);
        background: var(--oc-blue);
        color: #fff;
      }
      .btn {
        border-radius: 0.42rem;
      }
      .text-oc {
        color: var(--oc-cyan) !important;
      }
      .card {
        border: 1px solid rgba(185, 200, 214, 0.78);
        border-radius: 0.48rem;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--oc-shadow);
      }
      .card-header {
        background: rgba(247, 251, 253, 0.92);
        border-bottom-color: var(--oc-line);
      }
      .surface {
        position: relative;
        border: 1px solid rgba(185, 200, 214, 0.82);
        border-radius: 0.5rem;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 252, 253, 0.91));
        box-shadow: var(--oc-shadow);
      }
      .surface::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(9, 169, 200, 0.10), transparent 28%);
        opacity: 0.75;
      }
      .surface > * {
        position: relative;
        z-index: 1;
      }
      .metric {
        min-height: 6.5rem;
        border: 1px solid rgba(185, 200, 214, 0.82);
        border-radius: 0.46rem;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(238, 247, 250, 0.8)),
          linear-gradient(90deg, rgba(9, 169, 200, 0.18) 0 0.18rem, transparent 0.18rem 100%);
        padding: 1rem;
        box-shadow: var(--oc-glow);
      }
      .metric-label {
        color: #5f7288;
        font-size: 0.78rem;
        font-weight: 760;
        text-transform: uppercase;
      }
      .metric-value {
        margin-top: 0.35rem;
        font-size: 1.08rem;
        font-weight: 780;
        word-break: break-word;
      }
      .badge-status {
        display: inline-flex;
        align-items: center;
        min-height: 1.75rem;
        padding: 0.28rem 0.62rem;
        border-radius: 0.35rem;
        font-size: 0.78rem;
        font-weight: 780;
        border: 1px solid transparent;
      }
      .badge-running {
        background: var(--oc-green-soft);
        color: var(--oc-green);
        border-color: rgba(8, 122, 103, 0.16);
      }
      .badge-stopped {
        background: var(--oc-amber-soft);
        color: var(--oc-amber);
        border-color: rgba(162, 97, 5, 0.18);
      }
      .badge-neutral {
        background: #edf5f8;
        color: #526879;
        border-color: rgba(82, 104, 121, 0.12);
      }
      .table thead th {
        background: #eef6f9;
        color: #516b7d;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .table > :not(caption) > * > * {
        padding: 0.92rem 1rem;
        border-bottom-color: #e6eef3;
      }
      .table-hover tbody tr:hover {
        background-color: rgba(9, 169, 200, 0.055);
      }
      .table-sticky-scroll {
        max-height: 15rem;
        overflow: auto;
      }
      .table-sticky-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 1;
      }
      .form-control,
      .form-select {
        border-color: #cfd7df;
        border-radius: 0.42rem;
        background-color: rgba(255, 255, 255, 0.88);
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--oc-cyan);
        box-shadow: 0 0 0 0.2rem rgba(9, 169, 200, 0.14);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .codebox {
        max-height: 30rem;
        overflow: auto;
        background: #0c1720;
        color: #d9edf4;
        border: 1px solid rgba(9, 169, 200, 0.22);
        border-radius: 0.42rem;
        padding: 1rem;
        font-size: 0.82rem;
        line-height: 1.55;
      }
      .soft-danger {
        background: var(--oc-red-soft);
        color: var(--oc-red-dark);
        border: 1px solid #efc0c0;
      }
      .soft-success {
        background: var(--oc-green-soft);
        color: var(--oc-green);
        border: 1px solid #b8dccc;
      }
      .soft-warning {
        background: var(--oc-amber-soft);
        color: var(--oc-amber);
        border: 1px solid #edd18d;
      }
      .action-panel {
        border: 1px solid rgba(185, 200, 214, 0.82);
        border-radius: 0.5rem;
        background: linear-gradient(180deg, rgba(244, 248, 251, 0.92), rgba(237, 246, 249, 0.88));
        padding: 1rem;
      }
      .section-title {
        color: var(--oc-ink);
        font-size: 0.95rem;
        font-weight: 820;
      }
      .muted-small {
        color: var(--oc-muted);
        font-size: 0.88rem;
      }
      @media (max-width: 860px) {
        .app-layout {
          display: block;
        }
        .sidebar {
          position: static;
          height: auto;
          padding: 0.85rem;
        }
        .sidebar-brand {
          margin-bottom: 0.75rem;
        }
        .sidebar-section,
        .sidebar-footer {
          display: none;
        }
        .sidebar-nav {
          display: flex;
          gap: 0.4rem;
          overflow-x: auto;
          padding-bottom: 0.1rem;
        }
        .sidebar-nav a {
          flex: 0 0 auto;
        }
        .sidebar.collapsed .sidebar-brand {
          justify-content: flex-start;
        }
        .sidebar.collapsed .brand-mark {
          margin-right: 0.55rem;
        }
        .sidebar.collapsed .sidebar-brand-text,
        .sidebar.collapsed .sidebar-nav-extra {
          display: revert;
        }
        .sidebar.collapsed .sidebar-nav a {
          justify-content: flex-start;
          padding: 0.5rem 0.72rem;
        }
        .sidebar.collapsed .oc-nav-icon {
          margin-right: 0.62rem;
        }
      }
      @media (max-width: 575.98px) {
        .page-title {
          font-size: 1.55rem;
        }
        .table > :not(caption) > * > * {
          padding: 0.72rem 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <symbol id="oc-icon-users" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </symbol>
        <symbol id="oc-icon-user-plus" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
          <line x1="23" y1="11" x2="17" y2="11"/>
        </symbol>
        <symbol id="oc-icon-shield-check" viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </symbol>
        <symbol id="oc-icon-database" viewBox="0 0 24 24">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
        </symbol>
        <symbol id="oc-icon-chevron-left" viewBox="0 0 24 24">
          <path d="m15 18-6-6 6-6"/>
        </symbol>
        <symbol id="oc-icon-chevron-right" viewBox="0 0 24 24">
          <path d="m9 18 6-6-6-6"/>
        </symbol>
      </defs>
    </svg>
    <div class="app-layout">
      <aside class="sidebar" id="ocSidebar">
        <div class="sidebar-brand">
          <span class="brand-mark">管</span>
          <span class="sidebar-brand-text">容器实例管理与运维平台</span>
        </div>
        <div class="sidebar-section">功能菜单</div>
        <div class="sidebar-nav">
          {% if show_global_admin_nav %}
            <a href="/admin/users">
              <svg class="oc-nav-icon"><use href="#oc-icon-users"/></svg>
              <span>用户实例管理</span>
            </a>
            <a href="/admin/create-user">
              <svg class="oc-nav-icon"><use href="#oc-icon-user-plus"/></svg>
              <span>创建用户实例</span>
            </a>
            <a href="/admin/device-approvals">
              <svg class="oc-nav-icon"><use href="#oc-icon-shield-check"/></svg>
              <span>设备审批</span>
            </a>
            <a href="/admin/metadata">
              <svg class="oc-nav-icon"><use href="#oc-icon-database"/></svg>
              <span>元数据管理</span>
            </a>
          {% endif %}
          <div class="sidebar-nav-extra">
            {% block nav_right %}{% endblock %}
            {% if current_user and auth_provider == "local" %}
              <form method="post" action="/logout" class="mt-2">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button class="btn btn-sm btn-oc-outline" type="submit">退出登录</button>
              </form>
            {% endif %}
          </div>
        </div>
        <div class="sidebar-footer">
          <span class="sidebar-footer-text">多实例运维控制台</span>
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="折叠侧栏" aria-expanded="true">
            <svg class="oc-toggle-icon oc-toggle-collapse"><use href="#oc-icon-chevron-left"/></svg>
            <svg class="oc-toggle-icon oc-toggle-expand"><use href="#oc-icon-chevron-right"/></svg>
          </button>
        </div>
      </aside>
      <div class="content-shell">
        <main class="container page-shell py-4 py-lg-5">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    <script>
      document.querySelectorAll('form[method="post"], form[method="POST"]').forEach(function(form) {
        if (!form.querySelector('input[name="csrf_token"]')) {
          var input = document.createElement('input');
          input.type = 'hidden';
          input.name = 'csrf_token';
          input.value = {{ csrf_token|default("")|tojson }};
          form.appendChild(input);
        }
      });
      (function() {
        var sidebar = document.getElementById('ocSidebar');
        var appLayout = document.querySelector('.app-layout');
        var toggle = document.getElementById('sidebarToggle');
        if (!sidebar || !appLayout || !toggle) return;

        var stored = localStorage.getItem('ocSidebarCollapsed');
        var collapsed = stored === 'true';

        function applyState(isCollapsed) {
          sidebar.classList.toggle('collapsed', isCollapsed);
          appLayout.classList.toggle('sidebar-collapsed', isCollapsed);
          toggle.setAttribute('aria-expanded', String(!isCollapsed));
          toggle.setAttribute('aria-label', isCollapsed ? '打开侧栏' : '折叠侧栏');
        }

        applyState(collapsed);

        toggle.addEventListener('click', function() {
          var isCollapsed = !sidebar.classList.contains('collapsed');
          applyState(isCollapsed);
          localStorage.setItem('ocSidebarCollapsed', isCollapsed);
        });
      })();
    </script>
  </body>
</html>
