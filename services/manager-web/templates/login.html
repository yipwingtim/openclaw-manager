{% extends "base.html" %}
{% block title %}登录 OpenClaw Manager{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="surface p-4">
        <div class="page-kicker">本地账号</div>
        <h1 class="page-title mb-3">登录 OpenClaw Manager</h1>
        {% if error %}<div class="alert soft-danger">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
          <input type="hidden" name="csrf_token" value="{{ login_csrf }}">
          <label class="form-label" for="username">用户名</label>
          <input class="form-control mb-3" id="username" name="username" autocomplete="username" required autofocus>
          <label class="form-label" for="password">密码</label>
          <input class="form-control mb-3" id="password" name="password" type="password" autocomplete="current-password" required>
          <button class="btn btn-oc w-100" type="submit">登录</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
