version: "3.9"

services:

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:{{VERSION}}
    container_name: openclaw_{{USER_ID}}
    restart: unless-stopped

    user: "1000:1000"

    ports:
      - "127.0.0.1:{{PORT}}:18789"

    volumes:
      - {{BASE_DIR}}/users/{{USER_ID}}/config:/home/node/.openclaw
      - {{BASE_DIR}}/users/{{USER_ID}}/workspaces:/workspaces
      - {{BASE_DIR}}/users/{{USER_ID}}/workspace:/home/node/.openclaw/workspace
      - {{BASE_DIR}}/users/{{USER_ID}}/skills:/workspaces/main/skills
      - {{BASE_DIR}}/users/{{USER_ID}}/extensions:/home/node/.openclaw/extensions
      - /etc/localtime:/etc/localtime:ro

    security_opt:
      - no-new-privileges:true

    environment:
      - TZ={{TZ}}

    cap_drop:
      - ALL

    networks:
      - agent-net

networks:
  agent-net:
    external: true
